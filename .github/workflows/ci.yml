name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  NEO4J_VERSION: "5.26.0"

jobs:
  verify:
    name: Maven verify and Neo4j smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven verify
        run: mvn -B -ntp verify

      - name: Smoke test installable plugin
        run: scripts/neo4j-smoke.sh

      - name: Upload shaded plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: dire-neo4j-plugin
          if-no-files-found: error
          path: |
            neo4j-plugin/target/dire-neo4j-plugin-*.jar
            !neo4j-plugin/target/original-*.jar
